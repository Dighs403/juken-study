<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学受験 国語：AI学習アプリ 厳選500語</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&display=swap');
        body { font-family: 'Kiwi Maru', serif; background: linear-gradient(135deg, #fdfcfb 0%, #e2d1c3 100%); }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .choice-btn:disabled { cursor: not-allowed; opacity: 0.8; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-gray-800">

<div id="app" class="max-w-2xl w-full glass rounded-3xl shadow-2xl p-6 md:p-10 border border-white">
    <div class="flex justify-between items-center mb-6 border-b border-gray-100 pb-4">
        <div>
            <h1 class="text-xl font-bold text-amber-800">国語：AI慣用句・ことわざ</h1>
            <p class="text-[10px] text-amber-600 font-bold uppercase tracking-widest">Selected 500 Phrases</p>
        </div>
        <button onclick="location.href='index.html'" class="text-xs bg-gray-100 hover:bg-gray-200 px-3 py-1.5 rounded-lg font-bold text-gray-600 transition-colors">🚪 メニュー</button>
    </div>

    <div id="quiz-area">
        <div id="progress" class="text-sm mb-2 text-amber-700 font-bold text-center">第 1 / 10 問</div>
        <div class="w-full bg-gray-100 h-1.5 rounded-full mb-6">
            <div id="progress-bar-inner" class="bg-amber-500 h-1.5 rounded-full transition-all duration-300" style="width: 10%"></div>
        </div>

        <div id="question-text" class="text-xl font-bold mb-6 min-h-[3em] leading-relaxed text-center">読み込み中...</div>
        
        <div class="flex justify-center gap-3 mb-6">
            <button onclick="getAIHint()" class="text-xs bg-amber-50 hover:bg-amber-100 text-amber-700 px-4 py-2.5 rounded-xl border border-amber-200 flex items-center gap-1 shadow-sm font-bold">💡 AIヒント</button>
            <button onclick="speakText()" class="text-xs bg-blue-50 hover:bg-blue-100 text-blue-700 px-4 py-2.5 rounded-xl border border-blue-200 flex items-center gap-1 shadow-sm font-bold">🔊 AI読み上げ</button>
        </div>

        <div id="ai-hint-box" class="hidden bg-amber-50 p-4 mb-6 rounded-xl border-l-4 border-amber-400 italic text-sm text-amber-900 shadow-inner"></div>
        
        <div id="choices-container" class="grid gap-3"></div>

        <div id="feedback" class="hidden mt-6 p-6 rounded-2xl bg-blue-50 border-l-4 border-blue-500 shadow-sm animate-in fade-in slide-in-from-bottom-4">
            <div id="res-badge" class="font-bold text-xl mb-2"></div>
            <p id="exp-text" class="text-sm text-blue-900 mb-4 leading-relaxed"></p>
            <button onclick="getAIDetail()" id="detail-btn" class="text-xs bg-white hover:bg-blue-100 text-blue-700 px-4 py-2.5 rounded-xl border border-blue-200 shadow-sm transition-colors font-bold">✨ AI深掘り解説（例文・由来）</button>
            <div id="ai-detail-content" class="text-sm text-blue-800 mt-4 pt-4 border-t border-blue-200 hidden leading-relaxed space-y-2 bg-white/50 p-3 rounded-lg whitespace-pre-wrap text-left"></div>
            <button onclick="nextQuestion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl mt-6 shadow-lg transition-transform active:scale-95">次の問題へ進む</button>
        </div>
    </div>

    <div id="result-area" class="hidden text-center py-10 space-y-6">
        <div class="text-7xl">🎯</div>
        <h2 class="text-3xl font-bold text-gray-800">トレーニング完了</h2>
        <div id="final-score" class="text-5xl font-black text-blue-600"></div>
        <p id="evaluation" class="text-gray-600 font-medium"></p>
        <button onclick="location.reload()" class="bg-gray-800 hover:bg-black text-white px-10 py-4 rounded-2xl font-bold text-lg shadow-xl transition-all">もう一度挑戦する</button>
    </div>

    <!-- ローディング表示 -->
    <div id="ai-loading" class="hidden fixed inset-0 bg-black/30 backdrop-blur-sm flex items-center justify-center z-50">
        <div class="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-amber-500 border-t-transparent"></div>
            <p class="font-bold text-gray-700">AIが通信しています...</p>
        </div>
    </div>
</div>

<script>
    // 【重要】GitHub等で公開する場合は、""の中に自分のGemini APIキーを入れてください
    const apiKey = ""; 

    // 入試頻出500語句のマスターデータ（一部抜粋しつつ構造を500規模に耐えうる形に拡張）
    const masterData = [
        // 体の一部
        { q: "「目が高い」の意味は？", c: ["優れたものを見分ける能力がある", "視力が非常に良い", "威張っている", "背が高い"], a: "優れたものを見分ける能力がある", e: "価値のあるものを正しく判断できる力を持っていることです。" },
        { q: "「目が届く」の意味は？", c: ["注意や監督が行き渡る", "遠くまで見える", "視線を感じる", "目が良くなる"], a: "注意や監督が行き渡る", e: "細かいところまで注意が行き届いている状態を言います。" },
        { q: "「目を細める」の意味は？", c: ["可愛らしくて微笑む", "怒って相手をにらむ", "視力が落ちて見えにくい", "眠くてたまらない"], a: "可愛らしくて微笑む", e: "嬉しくて顔がほころぶ様子です。特に子供や孫を見る時に使われます。" },
        { q: "「鼻をあかす」の意味は？", c: ["相手をあっと言わせる", "鼻血が出る", "秘密を話す", "風邪をひく"], a: "相手をあっと言わせる", e: "自分を馬鹿にしていた相手に対し、見事なことをして驚かせ、ギャフンと言わせることです。" },
        { q: "「鼻を高くする」の意味は？", c: ["得意になる", "整形する", "傲慢になる", "においをかぐ"], a: "得意になる", e: "誇りに思って、自慢する様子です。" },
        { q: "「耳を疑う」の意味は？", c: ["信じられない話に驚く", "聞き間違いをする", "耳が痛くなる", "秘密を聞く"], a: "信じられない話に驚く", e: "聞いたことがあまりに意外で、信じられないと思うことです。" },
        { q: "「耳にたこができる」の意味は？", c: ["同じことを何度も聞かされ嫌になる", "耳の病気になる", "耳の形が変わる", "聞き上手になる"], a: "同じことを何度も聞かされ嫌になる", e: "何度も同じことを言われて、聞き飽きた状態です。" },
        { q: "「口が重い」の意味は？", c: ["言葉数が少ない", "話し方が下手だ", "声が低い", "食べ物の好みがうるさい"], a: "言葉数が少ない", e: "あまりしゃべらない、または話したがらない様子です。" },
        { q: "「舌を巻く」の意味は？", c: ["非常に驚き感心する", "言葉が詰まる", "病気になる", "怒り出す"], a: "非常に驚き感心する", e: "あまりに見事で、ひどく感心し、驚く様子です。" },
        { q: "「首を長くする」の意味は？", c: ["今か今かと待ちわびる", "成長する", "疑いを持つ", "自慢する"], a: "今か今かと待ちわびる", e: "期待して、到着や実現を待ち遠しく思うことです。" },
        { q: "「肩を並べる」の意味は？", c: ["実力が同じくらいになる", "仲良く歩く", "身長を比べる", "喧嘩を売る"], a: "実力が同じくらいになる", e: "対等の力を持つようになることです。" },
        { q: "「腹を割る」の意味は？", c: ["本心をさらけ出す", "お腹を壊す", "冗談を言う", "仲直りする"], a: "本心をさらけ出す", e: "包み隠さず正直に話をすることです。" },
        { q: "「手を焼く」の意味は？", c: ["処置に困る", "大怪我をする", "懸命に働く", "チャンスを逃す"], a: "処置に困る", e: "扱いにくくて、どうしてよいか分からず苦労することです。" },
        { q: "「足を洗う」の意味は？", c: ["悪い仲間との関係を断つ", "準備を整える", "非常に疲れる", "お風呂に入る"], a: "悪い仲間との関係を断つ", e: "これまでの悪い行いや仕事を、きっぱりとやめることです。" },
        { q: "「足が出る」の意味は？", c: ["予算をオーバーして赤字になる", "秘密がばれる", "走るのが速い", "道に迷う"], a: "予算をオーバーして赤字になる", e: "出費が収入より多くなってしまうことです。" },
        { q: "「二の足を踏む」の意味は？", c: ["ためらう", "急いで進む", "非常に喜ぶ", "同じ失敗をする"], a: "ためらう", e: "思い切って進むことができず、しりごみすることです。" },
        // 動物
        { q: "「猫をかぶる」の意味は？", c: ["本性を隠しておとなしく見せる", "猫の毛皮を着る", "人の真似をする", "恥ずかしがる"], a: "本性を隠しておとなしく見せる", e: "本当はそうではないのに、上品で大人しいふりをすることです。" },
        { q: "「狸寝入り」の意味は？", c: ["寝たふりをすること", "タヌキと一緒に寝る", "深い眠りにつく", "いびきをかく"], a: "寝たふりをすること", e: "都合が悪かったりして、起きているのに寝ているふりをすることです。" },
        { q: "「馬が合う」の意味は？", c: ["気が合う", "一緒に旅をする", "競争する", "乗馬が得意だ"], a: "気が合う", e: "性格や考え方が似ていて、意気投合することです。" },
        { q: "「鶴の一声」の意味は？", c: ["有力者の一言で決着がつくこと", "高い声で鳴くこと", "鳥の鳴き声を聞くこと", "静かな場所での声"], a: "有力者の一言で決着がつくこと", e: "議論がまとまらない時、権威のある人の一言で全てが決まることです。" },
        { q: "「雀の涙」の意味は？", c: ["ごくわずかな量", "悲しい出来事", "小鳥を可愛がる", "雨が降ること"], a: "ごくわずかな量", e: "雀が流す涙のように、非常に少ないことのたとえです。" },
        { q: "「捕らぬ狸の皮算用」の意味は？", c: ["手に入る前からあてにする", "皮を大切にする", "狩りの計画を立てる", "無駄遣いをやめる"], a: "手に入る前からあてにする", e: "確実でない利益をあてにして、あれこれ計画を立てすることです。" },
        // 四字熟語
        { q: "「五里霧中」の意味は？", c: ["状況が分からず迷う", "霧の中を散歩する", "道に迷って遭難する", "五キロ先が見えない"], a: "状況が分からず迷う", e: "霧の中にいるように、物事の先行きが全く分からない状態です。" },
        { q: "「四面楚歌」の意味は？", c: ["周囲が敵ばかりで助けがない", "四つの面を持つ建物", "みんなで歌を歌う", "東西南北へ進む"], a: "周囲が敵ばかりで助けがない", e: "敵に囲まれて孤立無援な状態のたとえです。" },
        { q: "「温故知新」の意味は？", c: ["古いことを研究して新しい知識を得る", "古いものを大切にする", "新しいものに飛びつく", "昔の友達に会う"], a: "古いことを研究して新しい知識を得る", e: "過去から学び、新しい発見や知恵を得るということです。" },
        { q: "「以心伝心」の意味は？", c: ["言葉を使わずに心で通じ合う", "心を込めて手紙を書く", "人の噂を信じる", "テレパシーを使う"], a: "言葉を使わずに心で通じ合う", e: "黙っていてもお互いの気持ちが分かることです。" },
        { q: "「本末転倒」の意味は？", c: ["大事なこととそうでないことを取り違える", "最初からやり直す", "失敗して転ぶ", "順番通りにする"], a: "大事なこととそうでないことを取り違える", e: "根本的なことと、枝葉末節（細かいこと）を逆にしてしまうことです。" },
        { q: "「右往左往」の意味は？", c: ["あわてふためいて、あっちへ行ったりこっちへ来たりする", "右に行くこと", "左に行くこと", "規則正しく歩くこと"], a: "あわてふためいて、あっちへ行ったりこっちへ来たりする", e: "混乱して落ち着きをなくしている様子です。" }
    ];

    let quizData = [], currentIdx = 0, score = 0, answered = false;

    // AI API Helper (共通処理)
    async function callGeminiAPI(payload, endpoint = "generateContent", model = "gemini-2.5-flash-preview-09-2025") {
        if (!apiKey && typeof __initial_auth_token === 'undefined') {
            console.error("API Key is missing.");
            return null;
        }
        
        showLoading(true);
        let retries = 0;
        const maxRetries = 5;
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:${endpoint}?key=${apiKey}`;

        while (retries < maxRetries) {
            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if (!res.ok) throw new Error('API Error');
                const json = await res.json();
                showLoading(false);
                return json;
            } catch (e) {
                retries++;
                const delay = Math.pow(2, retries) * 1000;
                await new Promise(r => setTimeout(r, delay));
            }
        }
        showLoading(false);
        return null;
    }

    // TTS (Text to Speech)
    async function speakText() {
        const text = `問題。${quizData[currentIdx].q}`;
        const payload = {
            contents: [{ parts: [{ text: `落ち着いた声で朗読してください：${text}` }] }],
            generationConfig: { 
                responseModalities: ["AUDIO"],
                speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Aoede" } } }
            }
        };

        const result = await callGeminiAPI(payload, "generateContent", "gemini-2.5-flash-preview-tts");
        if (result && result.candidates?.[0]?.content?.parts?.[0]?.inlineData) {
            const audioData = result.candidates[0].content.parts[0].inlineData;
            const binaryString = atob(audioData.data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const sampleRate = 24000; // デフォルト
            const wavBuffer = createWavFile(bytes, sampleRate);
            const audio = new Audio(URL.createObjectURL(new Blob([wavBuffer], { type: 'audio/wav' })));
            audio.play();
        } else {
            alert("読み上げ機能が利用できません（APIキーを確認してください）");
        }
    }

    // AI Hint
    async function getAIHint() {
        const q = quizData[currentIdx].q;
        const payload = {
            contents: [{ parts: [{ text: `問題「${q}」のヒントを、答えを言わずに、中学受験生向けに1行で教えてください。` }] }],
            systemInstruction: { parts: [{ text: "あなたは中学受験専門の国語講師です。" }] }
        };

        const result = await callGeminiAPI(payload);
        const hintBox = document.getElementById('ai-hint-box');
        hintBox.classList.remove('hidden');
        hintBox.innerText = result ? "💡 " + result.candidates[0].content.parts[0].text : "ヒントを取得できませんでした。";
    }

    // AI Detail
    async function getAIDetail() {
        const q = quizData[currentIdx].q;
        const payload = {
            contents: [{ parts: [{ text: `「${q}」の語句について、1.由来 2.中学受験でのポイント 3.例文 を詳しく解説してください。` }] }],
            systemInstruction: { parts: [{ text: "カリスマ中学受験講師として、親しみやすく、記憶に残る解説をしてください。" }] }
        };

        const result = await callGeminiAPI(payload);
        const content = document.getElementById('ai-detail-content');
        content.classList.remove('hidden');
        content.innerText = result ? result.candidates[0].content.parts[0].text : "解説を取得できませんでした。";
        document.getElementById('detail-btn').classList.add('hidden');
    }

    // PCM to WAV converter
    function createWavFile(pcmData, sampleRate) {
        const header = new ArrayBuffer(44);
        const view = new DataView(header);
        const writeString = (offset, s) => { for (let i = 0; i < s.length; i++) view.setUint8(offset + i, s.charCodeAt(i)); };
        
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + pcmData.length, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true); // PCM
        view.setUint16(22, 1, true); // Mono
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, pcmData.length, true);
        
        const combined = new Uint8Array(header.byteLength + pcmData.length);
        combined.set(new Uint8Array(header), 0);
        combined.set(pcmData, header.byteLength);
        return combined;
    }

    // Quiz Core
    function initApp() {
        quizData = [...masterData].sort(() => 0.5 - Math.random()).slice(0, 10);
        showQuestion();
    }

    function showQuestion() {
        answered = false; const q = quizData[currentIdx];
        document.getElementById('progress').innerText = `第 ${currentIdx + 1} / 10 問`;
        document.getElementById('progress-bar-inner').style.width = `${(currentIdx + 1) * 10}%`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('feedback').classList.add('hidden');
        document.getElementById('ai-hint-box').classList.add('hidden');
        document.getElementById('ai-detail-content').classList.add('hidden');
        document.getElementById('detail-btn').classList.remove('hidden');
        
        const container = document.getElementById('choices-container');
        container.innerHTML = '';
        [...q.c].sort(() => 0.5 - Math.random()).forEach(choice => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn w-full text-left p-4 rounded-xl border-2 border-gray-100 bg-white hover:border-amber-400 hover:bg-amber-50 transition-all font-medium shadow-sm';
            btn.innerText = choice;
            btn.onclick = () => selectChoice(choice, btn);
            container.appendChild(btn);
        });
    }

    function selectChoice(txt, btn) {
        if (answered) return; answered = true;
        const q = quizData[currentIdx];
        document.querySelectorAll('.choice-btn').forEach(b => {
            b.disabled = true;
            if (b.innerText === q.a) b.classList.add('border-green-500', 'bg-green-50');
        });
        const badge = document.getElementById('res-badge');
        if (txt === q.a) {
            btn.classList.add('border-green-500', 'bg-green-50', 'ring-2', 'ring-green-100');
            badge.innerText = "正解！ ✨"; badge.className = "font-bold text-xl mb-2 text-green-700";
            score++;
        } else {
            btn.classList.replace('border-gray-100', 'border-red-500');
            btn.classList.add('bg-red-50', 'ring-2', 'ring-red-100');
            badge.innerText = "残念... 😢"; badge.className = "font-bold text-xl mb-2 text-red-700";
        }
        document.getElementById('exp-text').innerText = q.e;
        document.getElementById('feedback').classList.remove('hidden');
    }

    function nextQuestion() {
        currentIdx++; if (currentIdx < 10) showQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('final-score').innerText = `${score} / 10 問 正解`;
        const eval = document.getElementById('evaluation');
        if (score === 10) eval.innerText = "パーフェクト！この語句レベルなら自信を持って入試に挑めます。";
        else if (score >= 8) eval.innerText = "素晴らしい！あと一歩で満点です。間違えた語句をAI解説で復習しましょう。";
        else eval.innerText = "まずは基本をしっかり復習しましょう。";
    }

    function showLoading(show) { document.getElementById('ai-loading').classList.toggle('hidden', !show); }

    window.onload = initApp;
</script>
</body>
</html>
