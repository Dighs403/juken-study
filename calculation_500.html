<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中学受験 算数：計算500本ノック</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; padding: 0; } .print-container { box-shadow: none; border: none; padding: 0; } }
        body { background-color: #f8fafc; font-family: sans-serif; }
        .problem-box { border-bottom: 1px solid #e2e8f0; height: 120px; }
        .shikaku { display: inline-block; width: 30px; height: 25px; border: 1px solid #000; vertical-align: middle; margin: 0 4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    
    <div class="max-w-4xl mx-auto no-print mb-8 bg-white p-6 rounded-3xl shadow-lg border border-blue-100">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-blue-900">算数：計算500本ノック</h1>
                <p class="text-sm text-gray-500">25問×20セット。手書き余白付き印刷対応。</p>
            </div>
            <button onclick="location.href='index.html'" class="bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-xl text-sm font-bold text-gray-600 transition-colors">🚪 メニューに戻る</button>
        </div>
        
        <div class="flex flex-wrap gap-4 items-center">
            <div class="flex items-center gap-2">
                <span class="text-sm font-bold">セット：</span>
                <select id="set-selector" onchange="renderSet(this.value)" class="border p-2 rounded-xl bg-gray-50 font-bold text-blue-600 focus:outline-none focus:ring-2 ring-blue-200"></select>
            </div>
            <button onclick="window.print()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-xl font-bold shadow-md transition-all active:scale-95">🖨️ プリントアウト（A4）</button>
            <button onclick="toggleAnswers()" id="ans-btn" class="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-6 py-2.5 rounded-xl font-bold transition-all">✅ 解答を表示</button>
        </div>
    </div>

    <div id="print-area" class="max-w-4xl mx-auto bg-white p-8 border border-gray-200 min-h-[1100px] relative shadow-2xl print-container">
        <div class="flex justify-between items-end border-b-4 border-black pb-4 mb-6">
            <div>
                <h2 class="text-3xl font-black italic tracking-tighter" id="set-title">SET 01</h2>
                <p class="text-xs font-bold text-gray-400">JUKEN CALCULATION 500 CHALLENGE</p>
            </div>
            <div class="text-right space-y-1">
                <p class="text-xl font-bold">氏名：<span class="inline-block w-48 border-b border-black"></span></p>
                <p class="text-sm font-bold italic">Score：________ / 25</p>
            </div>
        </div>

        <div id="problems-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-12"></div>
        
        <div class="absolute bottom-6 right-8 text-xs font-bold text-gray-300">
            Page <span id="page-num">01</span> / 20
        </div>
    </div>

<script>
    let showAnswers = false, currentSet = 1;
    const sel = document.getElementById('set-selector');
    for (let i = 1; i <= 20; i++) {
        const opt = document.createElement('option'); opt.value = i; opt.innerText = `第 ${i} セット`; sel.appendChild(opt);
    }

    const rand = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    function generateProblem(idx) {
        const type = idx % 5;
        let q = "", a = "";
        
        if (type === 0) {
            const n1 = rand(11, 49), n2 = rand(3, 9), n3 = rand(10, 99);
            q = `${n1} × ${n2} ＋ ${n3}`; a = (n1 * n2 + n3).toString();
        } else if (type === 1) {
            const d1 = (rand(1, 99)/10).toFixed(1), d2 = (rand(1, 15)/10).toFixed(1);
            q = `${d1} × ${d2}`; a = (parseFloat(d1) * parseFloat(d2)).toFixed(2);
        } else if (type === 2) {
            const n1 = rand(100, 300), target = rand(10, 50), n2 = rand(2, 6);
            q = `${n1} － □ × ${n2} ＝ ${target}`; a = ((n1 - target) / n2).toString();
        } else if (type === 3) {
            const f1 = rand(2, 5), f2 = rand(2, 5);
            q = `1/${f1} ＋ 1/${f2}`; a = `${f1+f2}/${f1*f2}`;
        } else {
            const m = rand(1, 3), cm = rand(10, 90);
            q = `${m}m 5cm － ${cm}cm ＝ (____)cm`; a = (m * 100 + 5 - cm).toString();
        }
        return { q, a };
    }

    function renderSet(num) {
        currentSet = parseInt(num);
        document.getElementById('set-title').innerText = `SET ${num.toString().padStart(2, '0')}`;
        document.getElementById('page-num').innerText = num.toString().padStart(2, '0');
        const grid = document.getElementById('problems-grid');
        grid.innerHTML = '';
        
        // シード値的なランダム性をセット番号で固定（簡易的）
        for (let i = 1; i <= 25; i++) {
            const data = generateProblem(currentSet * 100 + i);
            const d = document.createElement('div');
            d.className = 'problem-box p-3 relative flex flex-col justify-between';
            d.innerHTML = `
                <div class="flex items-start gap-2">
                    <span class="text-sm font-bold text-gray-400">(${i})</span>
                    <span class="text-lg font-bold">${data.q.replace('□', '<span class="shikaku"></span>')}</span>
                </div>
                <div class="text-red-500 font-bold text-right text-sm ${showAnswers ? '' : 'invisible'}">
                    答: ${data.a}
                </div>
                <div class="no-print absolute top-1 right-2 text-[8px] text-gray-200">WORK SPACE</div>
            `;
            grid.appendChild(d);
        }
    }

    function toggleAnswers() {
        showAnswers = !showAnswers;
        document.getElementById('ans-btn').innerText = showAnswers ? '❌ 解答を隠す' : '✅ 解答を表示';
        renderSet(currentSet);
    }

    window.onload = () => renderSet(1);
</script>
</body>
</html>
